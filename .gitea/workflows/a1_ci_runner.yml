name: a1_ci_runner

on:
  pull_request:
    branches: [main]
    paths:
      - 'smartsens_sdk/**'

jobs:
  build:
    name: Build and Upload
    runs-on: a1_ci_builder
    steps:
      - name: Checkout code
        uses: https://gitee.com/actions-mirror/checkout@v4
      
      - name: Copy cache and dl from host
        run: |
          # 检查 host 目录是否存在
          if [ -d "/home/ci_work/build_files/cache" ] && [ -d "/home/ci_work/build_files/dl" ]; then
            echo "Copying cache and dl from host..."
            cp -r /home/ci_work/build_files/cache smartsens_sdk/
            cp -r /home/ci_work/build_files/dl smartsens_sdk/
          else
            echo "Warning: /home/ci_work/build_files/cache or /home/ci_work/build_files/dl not found. Proceeding without cache."
          fi

      - name: Build smartsens_sdk
        run: |
          cd smartsens_sdk
          ./scripts/a1_sc132gs_build.sh

      - name: Prepare build artifacts
        run: |
          PR_ID=${{ github.event.pull_request.number }}
          mkdir -p /home/ci_work/ci_upload/132/$PR_ID
          cp smartsens_sdk/output/images/zImage.smartsens-m1-evb /home/ci_work/ci_upload/132/$PR_ID

      - name: Upload to Seafile
        run: |
          PR_ID=${{ github.event.pull_request.number }}
          if ! /opt/upload_seafile.sh "/home/ci_work/ci_upload/132/$PR_ID/zImage.smartsens-m1-evb" "A1_CI_OUTPUT/132/$PR_ID"; then
            echo "Seafile upload failed"
            exit 1
          fi

  # 任务 2: 烧录测试 (Windows)，依赖于 build 任务
  flash_test:
    name: Flash and Test M1 Board
    needs: build
    runs-on: windows
    steps:
      # 步骤 1: 从 Seafile 下载 build 生成的固件
      - name: Download Firmware
        run: |
          $ROOT = "C:\Users\admin\Desktop"
          $SENSOR = "132"
          $seafilepsDir = "$ROOT\ci-tools"
          $remoteDir = "132/${{ github.event.pull_request.number }}"
          $LocalDLPath = "$ROOT\ci-tools\$SENSOR"

          # 创建本地目录
          New-Item -ItemType Directory -Force -Path $LocalDLPath
          cd $seafilepsDir
          # 执行下载脚本
          powershell.exe -ExecutionPolicy Bypass -File ".\seafile.ps1" -mode "download" -remoteTargetDir $remoteDir -localDownloadPath $LocalDLPath

          Start-Sleep -Seconds 10

      # 步骤 2: 打包固件
      - name: Package Firmware
        run: |
          $ROOT = "C:\Users\admin\Desktop"
          $SENSOR = "132"
          $LocalDLPath = "$ROOT\ci-tools\$SENSOR"
          $packDir = "$ROOT\ci-tools\$SENSOR\A1PackTool"
          $PKG_NAME = "SC132GS_A1_720x1280_raw8_90fps_linux_ISP_V2.pkg"
          $BIN_NAME = "SC132GS_A1_720x1280_raw8_90fps_linux_ISP_V2.bin"
          $m1TestDir = "$ROOT\ci-tools\$SENSOR\M1_220AT\huichuang220AT\M1_test"

          # 将下载的 zImage 复制到打包工具目录
          cd $LocalDLPath
          Copy-Item "$LocalDLPath\zImage.smartsens-m1-evb" "$packDir\zImage.smartsens-m1-evb" -Force

          Start-Sleep -Seconds 5

          # 执行打包命令
          cd $packDir
          .\A1PackTool.exe -i $PKG_NAME -o $BIN_NAME

          Start-Sleep -Seconds 5

          # 将打包好的 bin 文件复制到烧录脚本目录
          cd $packDir
          Copy-Item "$packDir\$BIN_NAME" "$m1TestDir\$BIN_NAME" -Force

          
      # 步骤 3: 烧录固件
      - name: Flash to Board
        run: |
          $ROOT = "C:\Users\admin\Desktop"
          $SENSOR = "132"
          $packDir = "$ROOT\ci-tools\$SENSOR\A1PackTool"
          $m1TestDir = "$ROOT\ci-tools\$SENSOR\M1_220AT\huichuang220AT\M1_test"
          $BIN_NAME = "SC132GS_A1_720x1280_raw8_90fps_linux_ISP_V2.bin"
          $testDir = "$ROOT\ci-tools\$SENSOR\test"

          cd $testDir
          C:\Users\admin\AppData\Local\Programs\Python\Python313\python.exe -X utf8 .\save_reference_image.py
          Start-Sleep -Seconds 20

          # 执行烧录脚本
          cd $m1TestDir
          C:\Users\admin\AppData\Local\Programs\Python\Python313\python.exe -X utf8 .\m1_test.py

      # 步骤 4: 抓图与对比
      - name: Capture and Check
        run: |
          $ROOT = "C:\Users\admin\Desktop"
          $SENSOR = "132"
          $testDir = "$ROOT\ci-tools\$SENSOR\test"
        
          cd $testDir
          Write-Host "当前目录: $PWD"
          Start-Sleep -Seconds 5
          C:\Users\admin\AppData\Local\Programs\Python\Python313\python.exe -X utf8 .\close_device_uart.py
          C:\Users\admin\AppData\Local\Programs\Python\Python313\python.exe -X utf8 .\open_device_uart.py
          C:\Users\admin\AppData\Local\Programs\Python\Python313\python.exe -X utf8 .\capture_and_check.py