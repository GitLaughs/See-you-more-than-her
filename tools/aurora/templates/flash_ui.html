<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aurora Flash Console</title>
  <style>
    :root {
      --bg0: #07121a;
      --bg1: #0f2431;
      --card: rgba(10, 26, 37, 0.82);
      --line: rgba(130, 202, 255, 0.32);
      --text: #e8f6ff;
      --muted: #91a8b5;
      --ok: #66f0b9;
      --warn: #ffd27a;
      --danger: #ff6d6d;
      --accent: #58c7ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(88, 199, 255, 0.25), transparent 30%),
        radial-gradient(circle at 80% 10%, rgba(102, 240, 185, 0.14), transparent 28%),
        linear-gradient(160deg, var(--bg0), var(--bg1));
    }

    .wrap {
      width: min(1120px, 92vw);
      margin: 28px auto;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 18px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.24);
    }

    .left {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .title {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0.5px;
    }

    .subtitle {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin: 6px 0;
      text-transform: uppercase;
      letter-spacing: 0.9px;
    }

    select, input {
      width: 100%;
      border-radius: 10px;
      border: 1px solid rgba(130, 202, 255, 0.3);
      background: rgba(10, 19, 27, 0.95);
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }

    .mode {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      border: 1px solid rgba(130, 202, 255, 0.35);
      padding: 8px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      user-select: none;
      transition: all 0.18s ease;
    }

    .chip.active {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(88, 199, 255, 0.16);
      transform: translateY(-1px);
    }

    .btns {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }

    .primary {
      flex: 1;
      background: linear-gradient(120deg, #2ad7ff, #79ffce);
      color: #032235;
      box-shadow: 0 10px 24px rgba(42, 215, 255, 0.25);
    }

    .ghost {
      background: rgba(11, 18, 24, 0.8);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .danger {
      background: rgba(255, 109, 109, 0.15);
      border: 1px solid rgba(255, 109, 109, 0.45);
      color: #ffd8d8;
    }

    .meta {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
      padding-top: 4px;
    }

    .right {
      display: flex;
      flex-direction: column;
      min-height: 680px;
    }

    .status {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 12px;
      border: 1px solid transparent;
    }

    .idle { color: var(--muted); border-color: rgba(145, 168, 181, 0.45); }
    .run  { color: #00181f; background: var(--warn); }
    .ok   { color: #042317; background: var(--ok); }
    .fail { color: #2c0000; background: var(--danger); }

    .terminal {
      flex: 1;
      margin: 0;
      padding: 16px;
      overflow: auto;
      font-family: "JetBrains Mono", "Consolas", monospace;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      color: #d4f0ff;
    }

    .hint {
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(255, 210, 122, 0.1);
      border: 1px dashed rgba(255, 210, 122, 0.45);
      font-size: 12px;
      color: #ffe8b8;
    }

    @media (max-width: 980px) {
      .wrap {
        width: min(96vw, 96vw);
        grid-template-columns: 1fr;
      }
      .right { min-height: 440px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel left">
      <h1 class="title">Aurora Flash Console</h1>
      <p class="subtitle">A1 固件一键烧录。优先调用容器 burn_tool，失败自动回退到 Aurora GUI。</p>

      <div>
        <label for="firmwareSelect">固件候选</label>
        <select id="firmwareSelect"></select>
      </div>

      <div>
        <label for="firmwarePath">或手动输入固件路径</label>
        <input id="firmwarePath" placeholder="E:/See-you-more-than-her/output/evb/latest/zImage.smartsens-m1-evb" />
      </div>

      <div>
        <label>烧录模式</label>
        <div class="mode">
          <div class="chip active" data-mode="auto">AUTO</div>
          <div class="chip" data-mode="docker">Docker burn_tool</div>
          <div class="chip" data-mode="aurora">Aurora GUI</div>
        </div>
      </div>

      <div class="btns">
        <button class="primary" id="startBtn">开始烧录</button>
        <button class="ghost" id="refreshBtn">刷新固件列表</button>
      </div>
      <div class="btns">
        <button class="danger" id="stopBtn">停止任务</button>
      </div>

      <div class="meta" id="metaText">等待任务启动...</div>
      <div class="hint">硬件提示: 开始前请确认 SW3 拨到 CH347 侧，并且 Type-C 已连接。</div>
    </section>

    <section class="panel right">
      <div class="status">
        <div>
          <strong>任务状态</strong>
          <span id="stateBadge" class="badge idle">IDLE</span>
        </div>
        <div id="modeText" class="meta"></div>
      </div>
      <pre id="terminal" class="terminal">[READY] 点击“开始烧录”执行任务...</pre>
    </section>
  </div>

  <script>
    const firmwareSelect = document.getElementById('firmwareSelect');
    const firmwarePath = document.getElementById('firmwarePath');
    const startBtn = document.getElementById('startBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const stopBtn = document.getElementById('stopBtn');
    const terminal = document.getElementById('terminal');
    const stateBadge = document.getElementById('stateBadge');
    const metaText = document.getElementById('metaText');
    const modeText = document.getElementById('modeText');

    let mode = 'auto';
    let timer = null;
    let lastJoinedLog = '';

    function setBadge(type, text) {
      stateBadge.className = `badge ${type}`;
      stateBadge.textContent = text;
    }

    function selectedFirmware() {
      const manual = firmwarePath.value.trim();
      if (manual) return manual;
      return firmwareSelect.value || '';
    }

    async function loadFirmware() {
      const res = await fetch('/api/firmware');
      const data = await res.json();
      firmwareSelect.innerHTML = '';
      if (!data.items || data.items.length === 0) {
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = '未发现固件，请手动输入路径';
        firmwareSelect.appendChild(opt);
        return;
      }

      data.items.forEach((item, idx) => {
        const opt = document.createElement('option');
        opt.value = item.path;
        opt.textContent = `${item.display} (${item.sizeMB} MB)`;
        firmwareSelect.appendChild(opt);
        if (idx === 0 && !firmwarePath.value.trim()) {
          firmwarePath.value = item.path;
        }
      });
    }

    async function startFlash() {
      const firmware = selectedFirmware();
      if (!firmware) {
        alert('请选择或输入固件路径');
        return;
      }

      const res = await fetch('/api/flash', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ firmware, mode }),
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        alert(data.error || '启动失败');
        return;
      }
      terminal.textContent = '[INFO] 任务已提交，等待日志...';
      lastJoinedLog = '';
      await pollStatus();
    }

    async function stopFlash() {
      const res = await fetch('/api/stop', { method: 'POST' });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        alert(data.error || '停止失败');
      }
    }

    async function pollStatus() {
      const res = await fetch('/api/status');
      const data = await res.json();

      modeText.textContent = data.mode ? `模式: ${data.mode}` : '';

      if (data.running) {
        setBadge('run', 'RUNNING');
      } else if (data.success === true) {
        setBadge('ok', 'SUCCESS');
      } else if (data.success === false) {
        setBadge('fail', 'FAILED');
      } else {
        setBadge('idle', 'IDLE');
      }

      if (data.startedAt) {
        const started = new Date(data.startedAt * 1000).toLocaleString();
        const finished = data.finishedAt ? new Date(data.finishedAt * 1000).toLocaleString() : '-';
        metaText.textContent = `开始: ${started} | 结束: ${finished} | 退出码: ${data.returnCode ?? '-'}`;
      }

      const joined = (data.logs || []).join('\n');
      if (joined !== lastJoinedLog) {
        terminal.textContent = joined || '[INFO] 暂无日志';
        terminal.scrollTop = terminal.scrollHeight;
        lastJoinedLog = joined;
      }
    }

    function bindModeChips() {
      document.querySelectorAll('.chip').forEach((chip) => {
        chip.addEventListener('click', () => {
          document.querySelectorAll('.chip').forEach((c) => c.classList.remove('active'));
          chip.classList.add('active');
          mode = chip.dataset.mode;
        });
      });
    }

    startBtn.addEventListener('click', startFlash);
    refreshBtn.addEventListener('click', loadFirmware);
    stopBtn.addEventListener('click', stopFlash);

    bindModeChips();
    loadFirmware();
    pollStatus();
    timer = setInterval(pollStatus, 1000);
  </script>
</body>
</html>
