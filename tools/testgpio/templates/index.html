<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A1 GPIO Test Panel</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --border: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --primary: #2563eb;
      --success: #16a34a;
      --warn: #d97706;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    .muted { color: var(--muted); }
    .grid { display: grid; gap: 12px; }
    label { display: grid; gap: 6px; font-size: 14px; }
    input, select, button {
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
    }
    .actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    button {
      cursor: pointer;
      background: var(--primary);
      border-color: #1d4ed8;
      font-weight: 600;
    }
    button.secondary { background: transparent; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      font-size: 13px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--warn);
    }
    .dot.running { background: var(--success); }
    pre {
      margin: 0;
      background: #020617;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      min-height: 460px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: Consolas, "SFMono-Regular", monospace;
      line-height: 1.45;
    }
    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .meta div {
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card grid">
      <div>
        <h1>A1 GPIO Test</h1>
        <div class="muted">一键发起 tx / rx / loop，采集 A1 输出日志。</div>
      </div>
      <div class="badge"><span id="statusDot" class="dot"></span><span id="statusText">idle</span></div>
      <label>模式
        <select id="mode">
          <option value="tx">tx</option>
          <option value="rx">rx</option>
          <option value="loop">loop</option>
        </select>
      </label>
      <label>GPIO 引脚
        <select id="pin">
          <option value="0">0</option>
          <option value="2">2</option>
          <option value="8" selected>8</option>
          <option value="9">9</option>
          <option value="10">10</option>
        </select>
      </label>
      <label>周期 (ms)
        <input id="period" type="number" min="1" value="500">
      </label>
      <label>持续时间 (s)
        <input id="duration" type="number" min="1" value="10">
      </label>
      <div class="actions">
        <button data-mode="tx">启动 TX</button>
        <button data-mode="rx">启动 RX</button>
        <button data-mode="loop">启动 LOOP</button>
      </div>
      <button id="refreshBtn" class="secondary">刷新状态</button>
    </section>

    <section class="card grid">
      <pre id="logView">等待运行...</pre>
      <div class="meta">
        <div><strong>Run ID</strong><div id="runId" class="muted">-</div></div>
        <div><strong>Log Path</strong><div id="logPath" class="muted">-</div></div>
        <div><strong>Command</strong><div id="command" class="muted">-</div></div>
        <div><strong>Started</strong><div id="startedAt" class="muted">-</div></div>
      </div>
    </section>
  </div>

  <script>
    const els = {
      mode: document.getElementById('mode'),
      pin: document.getElementById('pin'),
      period: document.getElementById('period'),
      duration: document.getElementById('duration'),
      statusDot: document.getElementById('statusDot'),
      statusText: document.getElementById('statusText'),
      logView: document.getElementById('logView'),
      runId: document.getElementById('runId'),
      logPath: document.getElementById('logPath'),
      command: document.getElementById('command'),
      startedAt: document.getElementById('startedAt'),
      refreshBtn: document.getElementById('refreshBtn'),
    };

    async function requestJson(url, options) {
      const response = await fetch(url, options);
      const payload = await response.json();
      if (!response.ok) throw new Error(payload.error || `HTTP ${response.status}`);
      return payload;
    }

    function renderRun(run) {
      if (!run) {
        els.statusText.textContent = 'idle';
        els.statusDot.classList.remove('running');
        els.runId.textContent = '-';
        els.logPath.textContent = '-';
        els.command.textContent = '-';
        els.startedAt.textContent = '-';
        els.logView.textContent = '等待运行...';
        return;
      }
      els.statusText.textContent = run.status;
      els.statusDot.classList.toggle('running', run.status === 'running');
      els.runId.textContent = run.id || '-';
      els.logPath.textContent = run.log_path || '-';
      els.command.textContent = (run.command || []).join(' ');
      els.startedAt.textContent = run.started_at ? new Date(run.started_at * 1000).toLocaleString() : '-';
      els.logView.textContent = run.log_excerpt || '日志文件已创建，等待采集输出...';
    }

    async function refreshStatus() {
      const payload = await requestJson('/api/gpio/status');
      renderRun(payload.run);
    }

    async function startRun(mode) {
      els.mode.value = mode;
      const payload = await requestJson('/api/gpio/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          mode,
          pin: Number(els.pin.value),
          period_ms: Number(els.period.value),
          duration_s: Number(els.duration.value),
        }),
      });
      renderRun(payload.run);
    }

    document.querySelectorAll('button[data-mode]').forEach((button) => {
      button.addEventListener('click', async () => {
        try {
          await startRun(button.dataset.mode);
        } catch (error) {
          els.logView.textContent = String(error);
        }
      });
    });

    els.refreshBtn.addEventListener('click', async () => {
      try {
        await refreshStatus();
      } catch (error) {
        els.logView.textContent = String(error);
      }
    });

    refreshStatus().catch((error) => {
      els.logView.textContent = String(error);
    });
    setInterval(() => refreshStatus().catch(() => {}), 2000);
  </script>
</body>
</html>
