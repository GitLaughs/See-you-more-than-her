name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-ros2:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup ROS 2 Jazzy
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common curl gnupg2 lsb-release
          sudo add-apt-repository -y universe
          sudo curl -sSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key -o /usr/share/keyrings/ros-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] http://packages.ros.org/ros2/ubuntu $(. /etc/os-release && echo $UBUNTU_CODENAME) main" | sudo tee /etc/apt/sources.list.d/ros2.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y ros-jazzy-ros-base python3-colcon-common-extensions

      - name: Install YDLidar SDK
        run: |
          git clone --depth 1 https://github.com/YDLIDAR/YDLidar-SDK.git /tmp/YDLidar-SDK
          cmake -S /tmp/YDLidar-SDK -B /tmp/YDLidar-SDK/build -DBUILD_EXAMPLES=OFF
          cmake --build /tmp/YDLidar-SDK/build --parallel $(nproc)
          sudo cmake --install /tmp/YDLidar-SDK/build
          sudo ldconfig

      - name: Build
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          cd src/ros2_ws
          colcon build --event-handlers console_direct+
  build-in-container:
    runs-on: ubuntu-24.04
    needs: build-ros2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build A1_Builder image
        run: |
          docker build -f docker/Dockerfile -t a1_builder .

      - name: Run containerized full build (SDK + ROS2) and produce EVB
        run: |
          docker run --rm -v $GITHUB_WORKSPACE:/workspace -w /workspace a1_builder bash -lc "chmod +x scripts/build_src_all.sh && scripts/build_src_all.sh"

      - name: Collect EVB artifacts
        if: always()
        run: |
          mkdir -p evb_artifacts
          if [ -d output/evb ]; then cp -v output/evb/* evb_artifacts/ || true; fi
          find data/A1_SDK_SC132GS/smartsens_sdk/output/images -type f \( -name "*.evb" -o -name "*evb" -o -name "*EVB*" \) -exec cp -v {} evb_artifacts/ \; || true

      - name: Upload EVB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: evb-files
          path: evb_artifacts/
