# Aurora Runtime Layer Configuration
# 这是Runtime层组件的默认配置文件，包含BufferPool、ThreadPool等组件配置
# 本文件位于程序目录/.aurora 下，会在程序初始化时自动复制到实际配置目录
# 支持便捷单位表示：内存大小支持B/KB/MB/GB/TB，时间支持ms/s/min/h，百分比支持%符号

[buffer_pool]
# BufferPool缓冲池配置
max_buffers = 200                           # 最大缓冲区数量
max_memory = "8GB"                         # 最大内存使用量（支持便捷单位：B/KB/MB/GB/TB）
max_idle_time_seconds = 5.0                 # 最大空闲时间（秒）
enable_auto_cleanup = true                  # 启用自动清理
enable_preallocation = false               # 启用预分配
preallocate_count = 10                     # 预分配数量
enable_dynamic_adjustment = true            # 启用动态调整

# 清理配置
lru_cleanup_threshold = "80%"              # LRU清理触发阈值（支持%表示）
max_cleanup_batch = 10                     # 单次清理的最大缓冲区数量

# 内存压力管理配置（滞回机制）
memory_pressure_threshold = "80%"          # 高阈值 - 触发清理（支持%表示）
memory_pressure_low_threshold = "70%"      # 低阈值 - 停止清理（支持%表示，滞回防抖）

# 后台清理线程配置
cleanup_interval_seconds = 1              # 清理线程检查间隔（秒）
available_buffer_threshold = 50           # 可用缓冲区数量阈值
memory_usage_threshold = "75%"            # 后台清理使用率阈值（支持%表示）

[thread_pool]
# 全局线程池配置 - 基于实际GlobalThreadPool实现
max_threads = -1                        # 最大线程数（-1表示使用系统建议值）
expiry_timeout = 30000                  # 线程空闲超时时间（毫秒）

[memory_manager]
# 内存管理器配置 - 基于实际MemoryManagerConfig结构
default_alignment = 64                  # 默认内存对齐大小（64字节）
max_block_size = "800MB"               # 最大单个内存块大小（支持便捷单位：B/KB/MB/GB/TB）
max_total_memory = "8GB"               # 最大总内存限制（支持便捷单位：B/KB/MB/GB/TB）
enable_leak_detection = true            # 是否启用内存泄漏检测
enable_statistics = true                # 是否启用统计信息收集
size_class_granularity = 64             # Size class粒度（64字节）
max_size_classes = 1000                 # 最大size class数量