# Aurora Video Stream Pipeline - RAW Format
# RAW视频流管道 - Bayer RAW格式转RGB后显示

name = "Video Stream Pipeline - RAW"
version = "1.0.0"
description = "RAW视频流管道 - Bayer RAW格式转RGB后显示"

[metadata]
author = "Aurora Project"
category = "video"

[source_matching]
video_stream_plugin = "aurora.videostream.source.raw"

[[nodes]]
id = "raw_source"
node = "aurora.videostream.source.raw"
plugin = "VideoStreamPlugin"

[[nodes]]
id = "raw_to_rgb"
node = "aurora.colorconvert.raw_to_rgb"
plugin = "ColorConvertPlugin"

[[nodes]]
id = "render_endpoint"
node = "RenderNode"
plugin = "RenderManager"

[nodes.parameters]
autoDeletePipelineOnClose = true

[[nodes]]
id = "capture_process"
node = "aurora.capture.node"
plugin = "CapturePlugin"

[[connections]]
from_node = "raw_source"
from_pin = "0"
to_node = "raw_to_rgb"
to_pin = "0"

[[connections]]
from_node = "raw_to_rgb"
from_pin = "0"
to_node = "render_endpoint"
to_pin = "0"

# 所有节点到截图节点
[[connections]]
from_node = "*"
from_pin = "0"
to_node = "capture_process"
to_pin = "0"
