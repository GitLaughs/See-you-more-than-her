# Aurora Video Stream Pipeline - Gray Format
# 灰度视频流管道 - 灰度格式直接显示

name = "Video Stream Pipeline - Gray"
version = "1.0.0"
description = "灰度视频流管道 - 灰度格式直接显示"

[metadata]
author = "Aurora Project"
category = "video"

[source_matching]
video_stream_plugin = "aurora.videostream.source.gray"

[[nodes]]
id = "gray_source"
node = "aurora.videostream.source.gray"
plugin = "VideoStreamPlugin"

[[nodes]]
id = "render_endpoint"
node = "RenderNode"
plugin = "RenderManager"

[nodes.parameters]
autoDeletePipelineOnClose = true

[[nodes]]
id = "capture_process"
node = "aurora.capture.node"
plugin = "CapturePlugin"

[[connections]]
from_node = "gray_source"
from_pin = "0"
to_node = "render_endpoint"
to_pin = "0"

# 所有节点到截图节点
[[connections]]
from_node = "*"
from_pin = "0"
to_node = "capture_process"
to_pin = "0"
