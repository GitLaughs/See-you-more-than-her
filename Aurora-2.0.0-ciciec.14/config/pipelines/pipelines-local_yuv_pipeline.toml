# Aurora Raw Pipeline Configuration
# TOML格式的pipeline配置文件

name = "Aurora Raw Pipeline"
version = "2.0.0"
description = "本地源Raw Pipeline"

[metadata]
author = "Aurora Project"
created = "2025-01-15"
category = "raw"

# 源信息配置 - 解决启动请求缺少源信息的问题
[source_matching]
local_image_source = "YuvImageSourceNode"

# 节点定义
[[nodes]]
id = "raw_local_source"
node = "YuvImageSourceNode"
plugin = "LocalImageSource"

[[nodes]]
id = "yuv_to_rgb"
node = "aurora.colorconvert.yuv_to_rgb"
plugin = "ColorConvertPlugin"


[[nodes]]
id = "render_endpoint"
node = "RenderNode"
plugin = "RenderManager"

[nodes.parameters]
autoDeletePipelineOnClose = true

[[nodes]]
id = "capture_process"
node = "aurora.capture.node"
plugin = "CapturePlugin"


# 连接定义

[[connections]]
from_node = "raw_local_source"
from_pin = "0"
to_node = "yuv_to_rgb"
to_pin = "0"

[[connections]]
from_node = "yuv_to_rgb"
from_pin = "0"
to_node = "render_endpoint"
to_pin = "0"

# 所有节点到截图节点
[[connections]]
from_node = "*"
from_pin = "0"
to_node = "capture_process"
to_pin = "0"
