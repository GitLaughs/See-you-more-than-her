# Aurora Local Image Pipeline - RGB Format
# 本地RGB图像管道 - RGB格式直接显示

name = "Local Image Pipeline - RGB"
version = "1.0.0"
description = "本地RGB图像管道 - RGB格式直接显示"

[metadata]
author = "Aurora Project"
category = "image"

[source_matching]
local_image_source = "RgbImageSourceNode"

[[nodes]]
id = "rgb_local_source"
node = "RgbImageSourceNode"
plugin = "LocalImageSource"

[[nodes]]
id = "render_endpoint"
node = "RenderNode"
plugin = "RenderManager"

[[connections]]
from_node = "rgb_local_source"
from_pin = "0"
to_node = "render_endpoint"
to_pin = "0"
