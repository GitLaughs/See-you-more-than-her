[plugin]
name = "VideoStreamPlugin"
id = "video_stream_plugin"
version = "2.0.1"
description = "VideoStream Plugin for Aurora framework - Real-time video stream processing from cameras"
entry_dll = "VideoStreamPlugin.dll"
entry_dll_relative_path = "."

[plugin.info]
category = "video"
author = "Aurora Team"
organization = "Basic Software Group"
license = "MIT"

[dependencies]
aurora_version = "1.0"

# 服务依赖
service_dependencies = [
    "IGuiService/^1.0.0",
    "ILogService/^1.0.0"
]

shared_libs = []
plugin_dependencies = []

[resources]
translations = []

[loading]
load_on_startup = false

[environment]
min_windows_version = "10.0"
min_qt_version = "6.9.0"
cpu_arch = "x64"

[logging]
enabled = true
level = "INFO"
