[plugin]
name = "LocalVideoSourcePlugin"
id = "local_video_source"
version = "1.0.0"
description = "LocalVideoSource Plugin for Aurora framework - Local video file playback with FFmpeg decoder"
entry_dll = "LocalVideoSourcePlugin.dll"
entry_dll_relative_path = "."

[plugin.info]
category = "video"
author = "Aurora Team"
organization = "Basic Software Group"
license = "MIT"

[dependencies]
aurora_version = "1.0"

# 服务依赖
service_dependencies = [
    "ILogService/^1.0.0"
]

shared_libs = []
plugin_dependencies = []

[resources]
translations = []

[loading]
load_on_startup = false

[environment]
min_windows_version = "10.0"
min_qt_version = "6.9.0"
cpu_arch = "x64"

[logging]
enabled = true
level = "INFO"
