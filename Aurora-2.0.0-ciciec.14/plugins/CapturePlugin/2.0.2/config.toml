# config.toml - CapturePlugin 配置文件
# 根据 Aurora 插件文件夹规范 v1.4 生成

[plugin]
# 插件基本信息
name = "CapturePlugin"                  # 插件名称 (必需)
id = "capture_plugin"                   # 插件唯一ID (必需)
version = "2.0.2"  # 插件版本号 (必需)
description = "图像采集插件 - 简洁版，专注于核心图像捕获功能"    # 插件描述 (根据variant动态生成)

# 插件入口 DLL
entry_dll = "CapturePlugin.dll"         # 入口 DLL 文件名 (必需)
entry_dll_relative_path = "."           # 相对于插件版本文件夹的路径 (默认 ".")

# 插件分类与作者信息
[plugin.info]
category = "图像采集"                    # 插件分类
author = "Aurora Project"               # 作者
organization = "Basic Software Group"   # 组织
license = "Proprietary"                 # 许可证类型
variant = "simple"             # 插件变体 (full/simple)
features = "基础图像捕获,常用格式导出"          # 功能列表

# 依赖配置
[dependencies]
# Aurora 框架版本依赖
aurora_version = "1.0"                  # 需要的 Aurora 框架版本 (必需)

# 公共库依赖 (从主程序目录下的 SharedLibs/ 加载)
# 注意: Qt 框架库由主程序提供,插件不应在此声明 Qt DLL
# FFmpeg DLL 作为专用依赖已放在插件版本目录下，无需在此声明
shared_libs = []

# 依赖的其他插件（支持版本约束）
plugin_dependencies = []

# 依赖的服务（支持版本约束）
service_dependencies = [
    "LogService/^2.0",                  # 日志服务
    "GuiService/^1.0"                   # GUI 服务
]

# 加载选项 (可选)
[loading]
load_on_startup = false                 # 是否在启动时自动加载 (默认 false)

# 环境要求 (可选)
[environment]
min_windows_version = "10.0"            # 最低 Windows 版本
min_qt_version = "6.9.0"                # 最低 Qt 版本
cpu_arch = "x64"                        # CPU 架构

# 日志配置 (可选)
[logging]
enabled = true                          # 是否启用日志 (默认 true)
level = "INFO"                          # 日志级别
