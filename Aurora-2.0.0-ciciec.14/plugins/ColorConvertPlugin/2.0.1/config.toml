[plugin]
name = "ColorConvertPlugin"
id = "color_convert_plugin"
version = "2.0.1"
description = "ColorConvert Plugin for Aurora framework - High-performance Bayer to RGB format conversion"
entry_dll = "ColorConvertPlugin.dll"
entry_dll_relative_path = "."

[plugin.info]
category = "image_processing"
author = "Aurora Team"
organization = "Basic Software Group"
license = "MIT"

[dependencies]
aurora_version = "1.0"

# 服务依赖
service_dependencies = [
    "IGuiService/^1.0",
    "ILogService/^1.0"
]

shared_libs = []
plugin_dependencies = []

[resources]
# 翻译文件已编译到Qt资源系统中 (:/translations/ColorConvert_*.qm)
# 不需要外部翻译文件
translations = []

[loading]
load_on_startup = false

[environment]
min_qt_version = "6.9.0"
cpu_arch = "x64"

[logging]
enabled = true
level = "INFO"
