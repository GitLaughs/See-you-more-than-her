[plugin]
name = "CH347Plugin"
id = "ch347_plugin"
version = "1.1.4"
description = "CH347 Device Plugin for Aurora framework - I2C/SPI/Serial communication and A1 image tools"
entry_dll = "CH347Plugin.dll"
entry_dll_relative_path = "."

[plugin.info]
category = "hardware"
author = "Aurora Team"
organization = "Basic Software Group"
license = "MIT"

[dependencies]
aurora_version = "1.0"

# 服务依赖
service_dependencies = [
    "IGuiService/^1.0.0",
    "ILogService/^1.0.0",
    "IImageFactoryService/^1.0.0",
    "ICaptureService/^1.0.0"
]

shared_libs = []
plugin_dependencies = []

[resources]
translations = []

[loading]
load_on_startup = false

[environment]
min_windows_version = "10.0"
min_qt_version = "6.9.0"
cpu_arch = "x64"

[logging]
enabled = true
level = "INFO"
